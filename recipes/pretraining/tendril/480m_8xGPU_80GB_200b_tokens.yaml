name: tendril_480m_8xGPU_80GB_pretraining_200b
description: 8xGPU_80GB pretraining recipe for Tendril 480M with over ~200B tokens.

config:
  run:
    name: tendril_480m_8xGPU_80GB_pretraining_200b

  runtime:
    device_type: cuda
    training_precision: bf16
    use_torch_compile: true
    use_fsdp: false
    number_of_cpu_processes: 16

  training:
    stage: pretraining
    seed: 42
    total_batch_size: 1048576
    micro_batch_size: 8
    max_steps: 381470
    early_stopping_patience: 1000000
    early_stopping_patience_skip_steps: 0

  model:
    architecture: tendril
    dim: 1024
    n_layers: 30
    n_heads: 8
    n_kv_heads: 4
    multiple_of: 1024
    ffn_dim_multiplier: 1.0
    norm_eps: 1.0e-5
    rope_theta: 500000.0
    max_seq_len: 2048

  tokenizer:
    checkpoint_path: HuggingFaceTB/SmolLM2-360M
    huggingface_tokenizer: true
    ignore_index: -100

  paths:
    datasets:
      pretraining_path: ./datasets/pretraining_200b_climbmix
    evals:
      hellaswag_path: ./datasets/hellaswag
      winogrande_path: ./datasets/winogrande
      arc_challenge_path: ./datasets/arc_challenge
    runs:
      output_dir_path: ./runs

  optimizers:
    adamw:
      max_lr: 2.0e-4
      min_lr: 2.0e-5
      weight_decay: 0.1
      betas: [0.9, 0.95]
      use_fused: null
      schedulers:
        active: wsd
        cosine:
          warmup_steps: 1000
        wsd:
          start_step: 0
          warmup_steps: 1000
          stable_steps: 342323
          decay_steps: 38147
    muon:
      enabled: false

  validation:
    every_x_steps: 1000
    validation_steps: 200
    run_on_first_step: true
    run_on_last_step: true

  generation:
    every_x_steps: 1000
    max_gen_len: 64
    run_on_first_step: true
    run_on_last_step: true

  evals:
    hellaswag:
      every_x_steps: 5000
      number_of_examples: 1000
      run_on_first_step: true
      run_on_last_step: true
    winogrande:
      every_x_steps: 5000
      number_of_examples: 1000
      run_on_first_step: true
      run_on_last_step: true
    arc_challenge:
      every_x_steps: 5000
      number_of_examples: 299
      run_on_first_step: true
      run_on_last_step: true

  checkpointing:
    save_checkpoints: true
    every_x_steps: 2000
    max_number_checkpoints: 30
    run_on_first_step: true
    run_on_last_step: true

  wandb:
    enabled: true

data:
  seed: 42

  datasets_common_settings:
    shard_size: 100_000_000
    target_tokens: 200_000_000_000
    validation_ratio: 0.002
    interleave_stopping_strategy: first_exhausted

  datasets:
    karpathy/climbmix-400b-shuffle:
      default:
        weight: 1.0
    
  evals:
    hellaswag:
      enabled: true
    winogrande:
      enabled: true
    arc_challenge:
      enabled: true

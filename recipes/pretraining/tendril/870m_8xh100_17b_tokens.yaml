name: tendril_870m_8xh100_pretraining
description: A validated 8xH100 pretraining recipe for Tendril 870M over ~17B tokens.

config:
  run:
    name: tendril_870m_8xh100_pretraining

  runtime:
    device_type: cuda
    training_precision: bf16
    use_torch_compile: true
    use_fsdp: false
    number_of_cpu_processes: 16

  training:
    stage: pretraining
    seed: 42
    total_batch_size: 1048576
    max_steps: 16578
    early_stopping_patience: 1000000
    early_stopping_patience_skip_steps: 0

  model:
    architecture: tendril
    dim: 1280
    n_layers: 36
    n_heads: 10
    n_kv_heads: 5
    multiple_of: 1024
    ffn_dim_multiplier: 1.0
    norm_eps: 1.0e-5
    rope_theta: 500000.0
    max_batch_size: 8
    max_seq_len: 2048

  tokenizer:
    checkpoint_path: HuggingFaceTB/SmolLM2-360M
    huggingface_tokenizer: true
    ignore_index: -100

  paths:
    datasets:
      pretraining_path: ./datasets/pretraining
    evals:
      hellaswag_path: ./datasets/hellaswag
      winogrande_path: ./datasets/winogrande
      arc_challenge_path: ./datasets/arc_challenge
    runs:
      output_dir_path: ./runs

  optimizers:
    adamw:
      min_lr: 3.0e-5
      max_lr: 3.0e-4
      weight_decay: 0.1
      betas: [0.9, 0.95]
      use_fused: null
      schedulers:
        active: cosine
        cosine:
          warmup_steps: 500
    muon:
      enabled: false

  validation:
    every_x_steps: 500
    validation_steps: 200
    run_on_first_step: true
    run_on_last_step: true

  generation:
    every_x_steps: 500
    max_test_gen_len: 64
    run_on_first_step: true
    run_on_last_step: true

  evals:
    hellaswag:
      every_x_steps: 1000
      number_of_examples: 200
      run_on_first_step: true
      run_on_last_step: true
    winogrande:
      every_x_steps: 1000
      number_of_examples: 200
      run_on_first_step: true
      run_on_last_step: true
    arc_challenge:
      every_x_steps: 1000
      number_of_examples: 200
      run_on_first_step: true
      run_on_last_step: true

  checkpointing:
    save_checkpoints: true
    every_x_steps: 250
    max_number_checkpoints: 3
    run_on_first_step: true
    run_on_last_step: true

  wandb:
    enabled: true

data:
  seed: 42

  datasets_common_settings:
    shard_size: 100000000
    target_tokens: 17383292928
    validation_ratio: 0.01

  datasets:
    HuggingFaceTB/smollm-corpus:
      fineweb-edu-dedup:
        weight: 0.50
      cosmopedia-v2:
        weight: 0.25
    Avelina/python-edu-cleaned:
      default:
        weight: 0.10

  evals:
    hellaswag:
      enabled: true
    winogrande:
      enabled: true
    arc_challenge:
      enabled: true

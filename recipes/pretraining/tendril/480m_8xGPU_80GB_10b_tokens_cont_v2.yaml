name: tendril_480m_8xGPU_80GB_pretraining_cont_10b_v2
description: >
  Tendril 480M continued pretraining from the +5B continuation final checkpoint.
  +10B tokens, low-LR WSD, factual/QA-enhanced continuation mix.

config:
  run:
    name: tendril_480m_8xGPU_80GB_pretraining_cont_10b_v2

  runtime:
    device_type: cuda
    training_precision: bf16
    use_torch_compile: true
    use_fsdp: false
    number_of_cpu_processes: 16

  training:
    stage: pretraining
    seed: 42
    total_batch_size: 1048576
    micro_batch_size: 8
    max_steps: 9537
    early_stopping_patience: 1000000
    early_stopping_patience_skip_steps: 0

  model:
    architecture: tendril
    dim: 1024
    n_layers: 30
    n_heads: 8
    n_kv_heads: 4
    multiple_of: 1024
    ffn_dim_multiplier: 1.0
    norm_eps: 1.0e-5
    rope_theta: 500000.0
    max_seq_len: 2048

  tokenizer:
    checkpoint_path: HuggingFaceTB/SmolLM2-360M
    huggingface_tokenizer: true
    ignore_index: -100

  paths:
    datasets:
      pretraining_path: ./datasets/pretraining_10b_cont_v2
    evals:
      hellaswag_path: ./datasets/hellaswag
      winogrande_path: ./datasets/winogrande
      arc_challenge_path: ./datasets/arc_challenge
    runs:
      output_dir_path: ./runs

  optimizers:
    adamw:
      max_lr: 2.0e-5
      min_lr: 2.0e-6

      weight_decay: 0.1
      betas: [0.9, 0.95]
      use_fused: null

      schedulers:
        active: wsd
        cosine:
          warmup_steps: 100
        wsd:
          start_step: 0
          warmup_steps: 200
          stable_steps: 7450
          decay_steps: 1887

    muon:
      enabled: false

  validation:
    every_x_steps: 500
    validation_steps: 50
    run_on_first_step: true
    run_on_last_step: true

  generation:
    every_x_steps: 250
    max_test_gen_len: 128
    run_on_first_step: true
    run_on_last_step: true

  evals:
    hellaswag:
      every_x_steps: 1000
      number_of_examples: 1000
      run_on_first_step: true
      run_on_last_step: true

    winogrande:
      every_x_steps: 1000
      number_of_examples: 1000
      run_on_first_step: true
      run_on_last_step: true

    arc_challenge:
      every_x_steps: 1000
      number_of_examples: 299
      run_on_first_step: true
      run_on_last_step: true

  checkpointing:
    save_checkpoints: true
    every_x_steps: 500
    max_number_checkpoints: 10
    run_on_first_step: true
    run_on_last_step: true

  wandb:
    enabled: true

data:
  seed: 42

  datasets_common_settings:
    shard_size: 100000000
    target_tokens: 10010000000
    validation_ratio: 0.02
    interleave_stopping_strategy: first_exhausted

  datasets:
    HuggingFaceTB/smollm-corpus:
      fineweb-edu-dedup:
        weight: 0.31
      cosmopedia-v2:
        weight: 0.15

    HuggingFaceFW/dclm_100BT-shuffled:
      default:
        weight: 0.20

    Avelina/python-edu-cleaned:
      default:
        weight: 0.07

    HuggingFaceTB/finemath:
      finemath-4plus:
        weight: 0.05
      infiwebmath-4plus:
        weight: 0.02

    open-web-math/open-web-math:
      default:
        weight: 0.04

    wikimedia/structured-wikipedia:
      enwiki_namespace_0:
        weight: 0.12

    common-pile/stackexchange:
      default:
        weight: 0.04

  evals:
    hellaswag:
      enabled: true
    winogrande:
      enabled: true
    arc_challenge:
      enabled: true

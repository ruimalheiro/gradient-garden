name: debug_pretraining
description: Small pretraining recipe for smoke tests.

config:
  run:
    name: debug_pretraining

  runtime:
    device_type: cuda
    training_precision: bf16
    use_torch_compile: false
    use_fsdp: false
    number_of_cpu_processes: 16

  training:
    stage: pretraining
    seed: 42
    total_batch_size: 32768
    max_steps: 20
    early_stopping_patience: 5
    early_stopping_patience_skip_steps: 0

  model:
    architecture: tendril
    dim: 768
    n_layers: 16
    n_heads: 16
    n_kv_heads: 8
    multiple_of: 1024
    ffn_dim_multiplier: 1.0
    norm_eps: 1.0e-5
    rope_theta: 500000.0
    max_batch_size: 4
    max_seq_len: 1024

  tokenizer:
    checkpoint_path: HuggingFaceTB/SmolLM2-360M
    huggingface_tokenizer: true
    ignore_index: -100

  paths:
    datasets:
      pretraining_path: ./datasets/debug/pretraining
    evals:
      hellaswag_path: ./datasets/debug/hellaswag
      winogrande_path: ./datasets/debug/winogrande
      arc_challenge_path: ./datasets/debug/arc_challenge
    runs:
      output_dir_path: ./runs
    test_prompts_path: ./test_prompts.json

  optimizers:
    adamw:
      min_lr: 3.0e-5
      max_lr: 3.0e-4
      weight_decay: 0.1
      betas: [0.9, 0.95]
      use_fused: null
      schedulers:
        active: cosine
        cosine:
          warmup_steps: 2
    muon:
      enabled: false

  validation:
    every_x_steps: -1
    validation_steps: 5
    run_on_first_step: true
    run_on_last_step: true

  generation:
    every_x_steps: -1
    max_test_gen_len: 64
    run_on_first_step: true
    run_on_last_step: true

  evals:
    hellaswag:
      every_x_steps: -1
      number_of_examples: 20
      run_on_first_step: true
      run_on_last_step: true
    winogrande:
      every_x_steps: -1
      number_of_examples: 20
      run_on_first_step: true
      run_on_last_step: true
    arc_challenge:
      every_x_steps: -1
      number_of_examples: 20
      run_on_first_step: true
      run_on_last_step: true

  checkpointing:
    save_checkpoints: true
    every_x_steps: -1
    max_number_checkpoints: 5
    run_on_first_step: true
    run_on_last_step: true

data:
  seed: 42
  datasets_common_settings:
    shard_size: 100000000

  datasets:
    HuggingFaceFW/fineweb-edu:
      sample-10BT:
        weight: 1.0
        transforms:
          max_datapoints: 10000

  evals:
    hellaswag:
      enabled: true
    winogrande:
      enabled: true
    arc_challenge:
      enabled: true

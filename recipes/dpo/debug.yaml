name: debug_dpo
description: Small DPO recipe for smoke tests.

config:
  run:
    name: debug_dpo

  runtime:
    device_type: cuda
    training_precision: bf16
    use_torch_compile: false
    use_fsdp: false
    number_of_cpu_processes: 16

  training:
    stage: dpo
    seed: 42
    total_batch_size: 8192
    micro_batch_size: 2
    max_steps: 10
    early_stopping_patience: 100
    early_stopping_patience_skip_steps: 0

  model:
    architecture: tendril
    dim: 768
    n_layers: 16
    n_heads: 16
    n_kv_heads: 8
    multiple_of: 1024
    ffn_dim_multiplier: 1.0
    norm_eps: 1.0e-5
    rope_theta: 500000.0
    max_seq_len: 512

  prompts:
    system_prompt: You are a helpful AI assistant.

  tokenizer:
    checkpoint_path: HuggingFaceTB/SmolLM2-360M
    huggingface_tokenizer: true
    ignore_index: -100

  paths:
    datasets:
      dpo_path: ./datasets/debug/dpo
    runs:
      output_dir_path: ./runs

  optimizers:
    adamw:
      min_lr: 1.0e-6
      max_lr: 1.0e-5
      weight_decay: 0.1
      betas: [0.9, 0.95]
      use_fused: null
      schedulers:
        active: cosine
        cosine:
          warmup_steps: 2
    muon:
      enabled: false

  validation:
    every_x_steps: -1
    validation_steps: 5
    run_on_first_step: true
    run_on_last_step: true

  generation:
    every_x_steps: -1
    max_gen_len: 64
    run_on_first_step: true
    run_on_last_step: true

  checkpointing:
    save_checkpoints: true
    every_x_steps: -1
    max_number_checkpoints: 5
    run_on_first_step: true
    run_on_last_step: true

  lora:
    enabled: false
    rank: 16
    alpha: 8
    dropout: 0.05
    target_modules: [wq, wk, wv, wo, w1, w3]

  distillation:
    enabled: false
    temperature: 2.0
    teacher_model_checkpoint: HuggingFaceTB/SmolLM2-360M

  dpo:
    beta: 0.1

data:
  seed: 42

  datasets:
    Anthropic/hh-rlhf:
      default:
        weight: 1.0
        transforms:
          max_datapoints: 1000

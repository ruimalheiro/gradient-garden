name: debug_dpo
description: Small DPO recipe for smoke tests.

config:
  runtime:
    device_type: cuda
    training_precision: bf16
    use_torch_compile: false
    use_fsdp: false
    number_of_cpu_processes: 16

  training:
    stage: dpo
    seed: 42
    total_batch_size: 8192
    max_steps: 50
    early_stopping_patience: 100
    early_stopping_patience_skip_steps: 0

  model:
    dim: 768
    n_layers: 16
    n_heads: 16
    n_kv_heads: 8
    multiple_of: 1024
    ffn_dim_multiplier: 1.0
    norm_eps: 1.0e-5
    rope_theta: 500000.0
    max_batch_size: 2
    max_seq_len: 512
    moe:
      enabled: false

  prompts:
    system_prompt: You are a helpful AI assistant

  tokenizer:
    checkpoint_path: HuggingFaceTB/SmolLM2-360M
    huggingface_tokenizer: true
    ignore_index: -100

  paths:
    datasets:
      pretraining_path: ./datasets/pretraining/debug
      instruct_path: ./datasets/instruct/debug
      dpo_path: ./datasets/dpo/debug
    evals:
      hellaswag_path: ./datasets/hellaswag
      winogrande_path: ./datasets/winogrande
      arc_challenge_path: ./datasets/arc_challenge
    checkpoints:
      pretraining_save_path: ./checkpoints/pretraining/debug
      pretraining_load_path: ./checkpoints/pretraining/debug
      instruct_save_path: ./checkpoints/instruct/debug
      instruct_load_path: ./checkpoints/instruct/debug
      dpo_save_path: ./checkpoints/dpo/debug
      dpo_load_path: ./checkpoints/dpo/debug
    test_prompts_path: ./test_prompts.json

  optimizers:
    adamw:
      min_lr: 1.0e-6
      max_lr: 1.0e-5
      weight_decay: 0.1
      betas: [0.9, 0.95]
      use_fused: null
      warmup_steps: 10
    muon:
      enabled: false

  validation:
    every_x_steps: -1
    validation_steps: 20
    run_on_first_step: false
    run_on_last_step: false

  evals:
    hellaswag:
      every_x_steps: -1
      number_of_examples: 200
      run_on_first_step: false
      run_on_last_step: false
    winogrande:
      every_x_steps: -1
      number_of_examples: 200
      run_on_first_step: false
      run_on_last_step: false
    arc_challenge:
      every_x_steps: -1
      number_of_examples: 200
      run_on_first_step: false
      run_on_last_step: false

  generation:
    every_x_steps: -1
    max_test_gen_len: 256
    run_on_first_step: false
    run_on_last_step: false

  checkpointing:
    save_checkpoints: false
    save_best_only: false
    every_x_steps: 50
    max_number_checkpoints: 5
    run_on_first_step: false
    run_on_last_step: false

  lora:
    enabled: false
    rank: 16
    alpha: 8
    dropout: 0.05
    target_modules: [wq, wk, wv, wo, w1, w3]

  distillation:
    enabled: false
    temperature: 2.0
    teacher_model_checkpoint: HuggingFaceTB/SmolLM2-360M

  dpo:
    beta: 0.1

data:
  seed: 42

  datasets:
    Anthropic/hh-rlhf:
      default:
        weight: 1.0
        transforms:
          max_datapoints: 1000

  evals:
    hellaswag:
      enabled: false
    winogrande:
      enabled: false
    arc_challenge:
      enabled: false

name: tendril_870m_1xh100_instruct_full
description: Tendril 870m 1xH100 full instruct finetuning.

config:
  run:
    name: tendril_870m_1xh100_instruct_full

  runtime:
    device_type: cuda
    training_precision: bf16
    use_torch_compile: false
    use_fsdp: false
    number_of_cpu_processes: 16

  training:
    stage: instruct
    seed: 42
    total_batch_size: 131072
    max_steps: 3000
    early_stopping_patience: 1000000
    early_stopping_patience_skip_steps: 0

  model:
    architecture: tendril
    dim: 1280
    n_layers: 36
    n_heads: 10
    n_kv_heads: 5
    multiple_of: 1024
    ffn_dim_multiplier: 1.0
    norm_eps: 1.0e-5
    rope_theta: 500000.0
    max_batch_size: 8
    max_seq_len: 2048

  prompts:
    system_prompt: You are a helpful AI assistant.

  tokenizer:
    checkpoint_path: HuggingFaceTB/SmolLM2-360M
    huggingface_tokenizer: true
    ignore_index: -100

  paths:
    datasets:
      instruct_path: ./datasets/instruct
    runs:
      output_dir_path: ./runs
    test_prompts_path: ./test_prompts.json

  optimizers:
    adamw:
      max_lr: 3.0e-6
      min_lr: 3.0e-5
      weight_decay: 0.05
      betas: [0.9, 0.95]
      use_fused: null
      warmup_steps: 50
    muon:
      enabled: false

  validation:
    every_x_steps: 100
    validation_steps: 125
    run_on_first_step: true
    run_on_last_step: true

  generation:
    every_x_steps: 100
    max_test_gen_len: 96
    run_on_first_step: true
    run_on_last_step: true

  checkpointing:
    save_checkpoints: true
    save_best_only: false
    every_x_steps: 250
    max_number_checkpoints: 5
    run_on_first_step: true
    run_on_last_step: true

  lora:
    enabled: false
    rank: 16
    alpha: 16
    dropout: 0.05
    target_modules: null

  distillation:
    enabled: false
    temperature: 2.0
    teacher_model_checkpoint: HuggingFaceTB/SmolLM2-360M

  dpo:
    beta: 0.1

  wandb:
    enabled: true

data:
  seed: 42

  datasets_common_settings:
    validation_ratio: 0.01

  datasets:
    HuggingFaceH4/ultrachat_200k:
      default:
        weight: 0.70
        transforms:
          max_datapoints: null
          max_messages: 4

    allenai/tulu-3-sft-personas-instruction-following:
      default:
        weight: 0.30
        transforms:
          max_datapoints: null
          max_messages: 2

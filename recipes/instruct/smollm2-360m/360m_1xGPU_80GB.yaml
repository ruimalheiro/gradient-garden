name: smollm2_360m_1xGPU_80GB_instruct_full
description: SmolLM2 360m 1xGPU_80GB full instruct finetuning.

config:
  run:
    name: smollm2_360m_1xGPU_80GB_instruct_full

  runtime:
    device_type: cuda
    training_precision: bf16
    use_torch_compile: false
    use_fsdp: false
    number_of_cpu_processes: 16

  training:
    stage: instruct
    seed: 42
    total_batch_size: 131072
    micro_batch_size: 4
    max_steps: 1000
    early_stopping_patience: 1000000
    early_stopping_patience_skip_steps: 0

  model:
    architecture: hf_wrapper
    model_name: HuggingFaceTB/SmolLM2-360M

  prompts:
    system_prompt: You are SmolLM2, a helpful AI assistant.

  tokenizer:
    checkpoint_path: HuggingFaceTB/SmolLM2-360M
    huggingface_tokenizer: true
    ignore_index: -100

  paths:
    datasets:
      instruct_path: ./datasets/instruct
    runs:
      output_dir_path: ./runs

  optimizers:
    adamw:
      max_lr: 3.0e-6
      min_lr: 3.0e-7
      weight_decay: 0.05
      betas: [0.9, 0.95]
      schedulers:
        active: wsd
        wsd:
          start_step: 0
          warmup_steps: 50
          stable_steps: 800
          decay_steps: 150
    muon:
      enabled: false

  validation:
    every_x_steps: 50
    validation_steps: 125
    run_on_first_step: true
    run_on_last_step: true

  generation:
    every_x_steps: 50
    max_test_gen_len: 64
    run_on_first_step: true
    run_on_last_step: true

  checkpointing:
    save_checkpoints: true
    every_x_steps: 50
    max_number_checkpoints: 20
    run_on_first_step: false
    run_on_last_step: true

  lora:
    enabled: false
    rank: 16
    alpha: 16
    dropout: 0.05
    target_modules: null

  distillation:
    enabled: false
    temperature: 2.0
    teacher_model_checkpoint: HuggingFaceTB/SmolLM2-360M

  dpo:
    beta: 0.1

  wandb:
    enabled: true

data:
  seed: 42

  datasets_common_settings:
    validation_ratio: 0.10

  datasets:
    HuggingFaceH4/ultrachat_200k:
      default:
        weight: 0.25

    HuggingFaceTB/smol-smoltalk:
      default:
        weight: 0.04

    allenai/tulu-3-sft-personas-instruction-following:
      default:
        weight: 0.16

    HuggingFaceH4/no_robots:
      default:
        weight: 0.10

    grammarly/coedit:
      default:
        weight: 0.15

    synthetic_instruct:
      default:
        weight: 0.10
        transforms:
          count: 10000
          oversample_factor: 4
          max_duplicates_per_example: 10
          model_name: 'SmolLM2'
          identity_message: 'I am SmolLM2, a helpful AI assistant.'
